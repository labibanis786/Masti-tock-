   its parent (flex justify-center), which is exactly what produced the
   colored bars down the left and right sides once the surrounding
   container/screen is wider than 400px. This forces that box to fill
   whatever width it's actually given instead, so there is nothing left
   uncovered on either side, at any screen size. Nothing else about the
   game (layout, spacing, functionality) changes. */
