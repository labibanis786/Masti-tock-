  <script>
  // ---- Room-host integration bridge (added for PingPong app wiring) ----
  // Talks to the parent page over postMessage using the same FOODWHEEL_*
  // protocol the previous wheel game used, so the room's coin wallet,
  // sync, and buy-coins button keep working unchanged.
  (function () {
    var inited = false;
    var justInitedValue = null;

    function getCtrl() {
      return window.FruitGameControl || window.FruitGame || null;
    }

    function relayBalance(bal) {
      if (!inited) return;
      if (justInitedValue !== null && bal === justInitedValue) {
        justInitedValue = null;
        return;
      }
      try {
        window.parent.postMessage({ type: "FOODWHEEL_BALANCE", balance: bal }, "*");
      } catch (e) {}
    }

    function waitForControl(cb, attemptsLeft) {
      var ctrl = getCtrl();
      if (ctrl) { cb(ctrl); return; }
      if (attemptsLeft <= 0) return;
      setTimeout(function () { waitForControl(cb, attemptsLeft - 1); }, 50);
    }

    waitForControl(function (ctrl) {
      if (typeof ctrl.onBalanceChange === "function") {
        ctrl.onBalanceChange(relayBalance);
      } else if (typeof ctrl.onPointsUpdate === "function") {
        ctrl.onPointsUpdate(relayBalance);
      }
      try {
        window.parent.postMessage({ type: "FOODWHEEL_READY" }, "*");
      } catch (e) {}
    }, 100);

    window.addEventListener("message", function (ev) {
      var data = ev && ev.data;
      if (!data || data.type !== "FOODWHEEL_INIT") return;
      var bal = Math.max(0, Math.floor(Number(data.balance) || 0));
      justInitedValue = bal;
      inited = true;
      waitForControl(function (ctrl) {
        if (typeof ctrl.setBalance === "function") ctrl.setBalance(bal);
      }, 40);
    });

    // No in-game buttons that add or otherwise change balance are created
    // here anymore — closing the game and buying coins are handled by the
    // room host chrome around this iframe, and the wallet only ever moves
    // through server-confirmed bets/wins (see the round sync below).

    // ---- Server-authoritative round sync ----
    // Bets go out to the server; the server alone decides the result and
    // any payout. This bridge only ever tells the local animation which
    // food to land on (forceResult) and what the real Top 3 winners were
    // (window.__fwTopWinners) — it never sets a result or a balance itself.
    function fmtShort(n) {
      n = Number(n) || 0;
      if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1).replace(/\.0$/, "") + "M";
      if (n >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1).replace(/\.0$/, "") + "K";
      return String(n);
    }
    var RANK_COLORS = ["#FFD700", "#C0C0C0", "#CD7F32"];
    window.__fwTopWinners = [];
    var lastForcedResult = null;

    waitForControl(function (ctrl) {
      if (typeof ctrl.onBet === "function") {
        ctrl.onBet(function (bet) {
          try {
            window.parent.postMessage({ type: "FOODWHEEL_BET", foodId: bet.foodId, amount: bet.amount }, "*");
          } catch (e) {}
        });
      }
    }, 100);

    window.addEventListener("message", function (ev) {
      var data = ev && ev.data;
      if (!data) return;

      if (data.type === "FRUITWHEEL_ROUND" && data.phase === "betting") {
        lastForcedResult = null;
      }

      if (data.type === "FRUITWHEEL_ROUND" && data.phase === "spinning" && data.resultFoodId) {
        if (lastForcedResult === data.resultFoodId) return;
        lastForcedResult = data.resultFoodId;
        waitForControl(function (ctrl) {
          if (typeof ctrl.forceResult === "function") ctrl.forceResult(data.resultFoodId);
        }, 20);
      }

      if (data.type === "FRUITWHEEL_WINNERS") {
        var wins = Array.isArray(data.winners) ? data.winners : [];
        window.__fwTopWinners = wins.slice(0, 3).map(function (w, idx) {
          return { rank: idx + 1, name: w.name, amt: fmtShort(w.amount), color: RANK_COLORS[idx] || "#8ED2FF" };
        });
      }
    });
  })();
  </script>
