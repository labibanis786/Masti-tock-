<style>
/* --- Fix: full-bleed override, no side bars -----------------------------
   The game's own root box is hard-capped at max-w-[440px] and centered by
   its parent (flex justify-center), which is exactly what produces the
   dark bars down the left and right sides once the surrounding
   container/screen is wider than 440px. This forces that box to fill
   whatever width it's actually given instead, so there is nothing left
   uncovered on either side, at any screen size. The md: breakpoint rules
   (which added margins/rounded corners/height caps once the embed is
   768px or wider, turning it into a floating "card") are neutralized for
   the same reason. Nothing else about the game (layout, spacing,
   functionality) changes. */
.max-w-\[440px\]{max-width:100% !important}
@media (min-width:768px){
  .md\:my-4{margin-top:0 !important;margin-bottom:0 !important}
  .md\:rounded-\[28px\]{border-radius:0 !important}
  .md\:border{border-width:0 !important}
  .md\:min-h-\[880px\]{min-height:100vh !important}
  .md\:max-h-\[96vh\]{max-height:none !important}
}
html,body,#root{width:100%;height:100%;margin:0;touch-action:manipulation}
</style>

<script>
  // Fix (pinch/double-tap zoom bug), scoped to this game's own document
  // since it loads in its own iframe with its own touch surface.
  document.addEventListener("touchmove", function(e){ if (e.touches && e.touches.length > 1) e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
  var __tpLastTouchEnd = 0;
  document.addEventListener("touchend", function(e){
    var now = Date.now();
    if (now - __tpLastTouchEnd <= 300) e.preventDefault();
    __tpLastTouchEnd = now;
  }, { passive: false });
</script>
